apiVersion: v1
kind: ServiceAccount
metadata:
  name: edsp-agent
  namespace: analysis
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: edsp-agent
  namespace: analysis
rules:
  # 기본 리소스
  - apiGroups: [""]
    resources:
      - pods
      - pods/exec
      - pods/log
      - services
      - configmaps
      - events
    verbs: ["get","list","watch","create","update","patch","delete"]

  # (선택) Secret이 꼭 필요할 때만 켜라. 필요 없으면 이 블록 삭제 권장
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get","list","watch"]  # 일단 read-only로 시작 추천

  # 워크로드
  - apiGroups: ["apps"]
    resources: ["deployments","replicasets","statefulsets"]
    verbs: ["get","list","watch","create","update","patch","delete"]

  # 배치
  - apiGroups: ["batch"]
    resources: ["jobs","cronjobs"]
    verbs: ["get","list","watch","create","update","patch","delete"]

  # (선택) ingress를 만들 거면 필요
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get","list","watch","create","update","patch","delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: edsp-agent
  namespace: analysis
subjects:
  - kind: ServiceAccount
    name: edsp-agent
    namespace: analysis
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: edsp-agent
